name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Optimize build config
        run: |
          # Only build arm64-v8a (covers 95%+ modern devices, cuts APK size ~75%)
          sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' android/gradle.properties
          # Enable ProGuard/R8 code shrinking + resource shrinking for release
          sed -i 's/android.enableMinifyInReleaseBuilds.*/android.enableMinifyInReleaseBuilds=true/' android/gradle.properties
          # Add shrink resources property if not present
          echo 'android.enableShrinkResourcesInReleaseBuilds=true' >> android/gradle.properties

      - name: Build APK with Gradle
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/meaning-weaver-${TAG}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/meaning-weaver-*.apk
